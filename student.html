<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DS English - 학생 포털</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#e8f4ff;--bg2:#ffffff;--bg3:#d4eaff;--bg4:#bddaff;
  --border:#90c4f5;--border2:#6aaae8;
  --text:#1a2035;--text2:#4a5577;--text3:#8896b8;
  --accent:#4f8ef7;--accent2:#3a6fd4;--accent-glow:rgba(79,142,247,0.12);
  --green:#1a9e6a;--green-bg:rgba(26,158,106,0.1);
  --amber:#c87a0d;--amber-bg:rgba(200,122,13,0.1);
  --red:#d63850;--red-bg:rgba(214,56,80,0.1);
  --purple:#7c5cfc;
  --radius:10px;--radius-lg:14px;
  --font:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#c8e4ff 0%,#e8f4ff 100%)}
.login-card{background:var(--bg2);border:2px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(79,142,247,0.18)}
.login-logo{width:64px;height:64px;border-radius:16px;object-fit:cover;display:block;margin:0 auto 14px;box-shadow:0 4px 12px rgba(79,142,247,0.2)}
.login-logo-fallback{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#4f8ef7,#7c5cfc);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin:0 auto 14px}
.login-title{font-size:22px;font-weight:700;color:var(--text);text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:6px}
.portal-tag{background:var(--accent-glow);color:var(--accent);font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;border:1px solid rgba(79,142,247,0.25)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.fg select,.fg input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s;-webkit-appearance:none}
.fg select:focus,.fg input:focus{border-color:var(--accent);background:var(--bg2)}
.login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;margin-top:6px}
.login-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,142,247,0.3)}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;line-height:1.6}

/* App Header */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 1px 6px rgba(30,40,80,0.06)}
.hdr-logo{width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0}
.hdr-brand{font-size:14px;font-weight:700;color:var(--text);flex-shrink:0}
.hdr-name{font-size:14px;font-weight:600;color:var(--text2)}
.hdr-cls{background:var(--accent-glow);color:var(--accent);font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;border:1px solid rgba(79,142,247,0.25);flex-shrink:0}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}
.logout-btn:hover{background:var(--bg3);color:var(--text)}

/* Tabs */
.tab-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;gap:4px}
.tab-btn{padding:13px 18px;font-size:13px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;font-family:var(--font);border-bottom:2.5px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Content */
.content{padding:20px;max-width:720px;margin:0 auto}

/* Calendar */
.cal-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:16px;font-weight:700;color:var(--text)}
.cal-nav{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;transition:all .15s;border:none}
.cal-nav:hover{background:var(--bg4);color:var(--text)}
.cal-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 2px 10px rgba(79,142,247,0.1)}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg3);border-bottom:1px solid var(--border)}
.cal-wd{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:9px 0}
.cal-wd:first-child{color:var(--red)}.cal-wd:last-child{color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:8px;gap:3px}
.cal-cell{min-height:58px;border-radius:9px;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:background .1s}
.cal-cell.today{background:var(--accent-glow);outline:1.5px solid var(--accent)}
.cal-cell.empty{opacity:0.18;pointer-events:none}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text2)}
.cal-cell.sun .cal-day-num{color:var(--red)}
.cal-cell.sat .cal-day-num{color:var(--accent)}
.cal-cell.today .cal-day-num{color:var(--accent);font-weight:700}
.status-chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.chip-att{background:var(--green-bg);color:var(--green)}
.chip-abs{background:var(--red-bg);color:var(--red)}
.chip-late{background:var(--amber-bg);color:var(--amber)}
.chip-noclass{background:var(--bg3);color:var(--text3)}
.chip-makeup{background:rgba(79,142,247,0.1);color:var(--accent)}

/* Stats */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.stat-box{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;box-shadow:0 1px 5px rgba(79,142,247,0.08)}
.stat-num{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px}

/* Badges */
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-title{font-size:15px;font-weight:700;color:var(--text)}
.count-pill{font-size:12px;color:var(--text3);background:var(--bg3);padding:3px 12px;border-radius:20px;border:1px solid var(--border)}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.badge-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-lg);padding:20px 14px;text-align:center;transition:all .2s;box-shadow:0 1px 5px rgba(79,142,247,0.08)}
.badge-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(30,40,80,0.1)}
.badge-icon-wrap{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px}
.badge-name{font-size:13px;font-weight:700;margin-bottom:4px}
.badge-desc{font-size:11px;color:var(--text3);line-height:1.4;margin-bottom:8px}
.badge-note{font-size:10px;color:var(--text2);background:var(--bg3);padding:3px 8px;border-radius:6px;margin-bottom:6px;display:inline-block}
.badge-date{font-size:10px;color:var(--text3);font-family:var(--mono)}
.badge-from{font-size:10px;color:var(--text2);margin-top:3px}

.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:0.35;display:block}
.empty-text{font-size:13px;line-height:1.8}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast-item{background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:10px 16px;font-size:13px;color:var(--text);box-shadow:0 4px 16px rgba(30,40,80,0.12);animation:ti .18s ease;display:flex;align-items:center;gap:8px}
@keyframes ti{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast-item.error{border-left:3px solid var(--red)}
.toast-item.success{border-left:3px solid var(--green)}

/* QR Camera */
.cam-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:none;align-items:center;justify-content:center}
.cam-modal-overlay.open{display:flex}
.cam-wrap{width:100%;max-width:400px;margin:16px;border-radius:18px;overflow:hidden;background:#000;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.cam-hdr{background:rgba(30,30,30,0.95);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.cam-hdr span{color:#fff;font-size:14px;font-weight:600}
.cam-hdr button{background:none;border:none;color:#fff;font-size:24px;line-height:1;cursor:pointer;padding:0 4px}
.cam-body{position:relative;background:#000}
#cam-video{width:100%;display:block;max-height:70vh;object-fit:cover}
.cam-guide-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none}
.cam-frame{width:200px;height:200px;border:3px solid rgba(255,255,255,0.9);border-radius:16px;box-shadow:0 0 0 2000px rgba(0,0,0,0.45)}
.cam-guide-txt{color:#fff;font-size:13px;font-weight:500;text-shadow:0 1px 4px rgba(0,0,0,0.8);background:rgba(0,0,0,0.4);padding:5px 14px;border-radius:20px}
.cam-status{padding:12px 18px;text-align:center;font-size:13px;color:#aaa;background:rgba(20,20,20,0.95);min-height:42px;white-space:pre-line;line-height:1.6}

/* QR 출석 버튼 (헤더용 소형 - 미사용) */
.qr-btn-sm{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px;transition:all .15s}
/* QR 출석 배너 버튼 */
.qr-banner{width:100%;padding:18px 24px;background:linear-gradient(135deg,var(--accent) 0%,var(--purple) 100%);color:#fff;border:none;border-radius:var(--radius-lg);font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px;box-shadow:0 4px 18px rgba(79,142,247,0.35);transition:all .18s;text-align:left}
.qr-banner:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,142,247,0.45)}
.qr-banner:active{transform:translateY(0)}
.qr-banner-icon{font-size:34px;line-height:1;flex-shrink:0}
.qr-banner-text{}
.qr-banner-title{font-size:16px;font-weight:700;line-height:1.2}
.qr-banner-sub{font-size:12px;opacity:0.85;margin-top:3px;font-weight:400}

/* Announcements & Messages */
.ann-list{display:flex;flex-direction:column;gap:10px}
.ann-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;transition:box-shadow .2s;box-shadow:0 1px 5px rgba(79,142,247,0.07)}
.ann-card.important{border-left:3px solid var(--red)}
.ann-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ann-title{font-size:14px;font-weight:600;color:var(--text)}
.ann-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.tag-important{background:var(--red-bg);color:var(--red);border:1px solid rgba(214,56,80,0.2)}
.tag-normal{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.tag-class{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(79,142,247,0.2)}
.ann-meta{font-size:11px;color:var(--text3);margin-bottom:8px}
.ann-body{font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.msg-card{background:var(--bg2);border:2px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:0 1px 5px rgba(79,142,247,0.07)}
.msg-type-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.mtype-study{background:rgba(79,142,247,0.1);color:var(--accent);border:1px solid rgba(79,142,247,0.2)}
.mtype-att{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(200,122,13,0.2)}
.mtype-score{background:var(--green-bg);color:var(--green);border:1px solid rgba(26,158,106,0.2)}
.mtype-class{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(124,92,252,0.2)}
.mtype-etc{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* 출석 시간 기록 */
.att-times-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-top:14px}
.att-times-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.att-time-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.att-time-row:last-child{border-bottom:none}
/* 숙제 */
.hw-card{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 10px rgba(79,142,247,0.08);transition:all .2s}
.hw-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,142,247,0.15)}
.hw-card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.hw-card-meta{font-size:11px;color:var(--text3);margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap}
.hw-link-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;box-shadow:0 3px 10px rgba(79,142,247,0.3);transition:all .15s;font-family:var(--font);border:none}
.hw-link-btn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(79,142,247,0.4)}
.hw-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px}
</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <img src="logo.jpg" class="login-logo" alt="DS English" onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
    <div class="login-logo-fallback" id="logo-fallback" style="display:none">DS</div>
    <div class="login-title">DS English</div>
    <div class="login-sub"><span class="portal-tag">👦 학생 포털</span></div>
    <div class="fg">
      <label>수업반 선택</label>
      <select id="l-class" onchange="filterStudents()">
        <option value="">-- 반을 선택하세요 --</option>
      </select>
    </div>
    <div class="fg">
      <label>내 이름 선택</label>
      <select id="l-student">
        <option value="">-- 이름을 선택하세요 --</option>
      </select>
    </div>
    <div class="fg">
      <label>비밀번호</label>
      <input type="tel" id="l-phone" placeholder="0000" maxlength="4" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- ── Main App ── -->
<div id="app" style="display:none">
  <header class="app-header">
    <img src="logo.jpg" class="hdr-logo" alt="DS" onerror="this.style.display='none'">
    <span class="hdr-brand">DS English</span>
    <span class="hdr-name" id="h-name"></span>
    <span class="hdr-cls" id="h-class"></span>
    <div class="hdr-right">
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-att-btn"  onclick="showTab('att')">📅 출결</button>
    <button class="tab-btn" id="tab-hw-btn"    onclick="showTab('hw')">📚 숙제</button>
    <button class="tab-btn" id="tab-badges-btn" onclick="showTab('badges')">🏅 배지</button>
    <button class="tab-btn" id="tab-ann-btn"   onclick="showTab('ann')">📢 공지·메시지</button>
  </div>

  <!-- 출결 섹션 -->
  <div id="tab-att" class="content">
    <div class="sec-header"><span class="sec-title">📅 내 출결</span></div>
    <button class="qr-banner" onclick="openCamera()">
      <span class="qr-banner-icon">📷</span>
      <div class="qr-banner-text">
        <div class="qr-banner-title">QR 출석 체크</div>
        <div class="qr-banner-sub">선생님의 QR 코드를 스캔하세요</div>
      </div>
    </button>
    <div class="cal-header-row">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-card">
      <div class="cal-wdays">
        <div class="cal-wd">일</div><div class="cal-wd">월</div><div class="cal-wd">화</div>
        <div class="cal-wd">수</div><div class="cal-wd">목</div><div class="cal-wd">금</div><div class="cal-wd">토</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="s-att" style="color:var(--green)">0</div><div class="stat-lbl">출석</div></div>
      <div class="stat-box"><div class="stat-num" id="s-abs" style="color:var(--red)">0</div><div class="stat-lbl">결석</div></div>
      <div class="stat-box"><div class="stat-num" id="s-late" style="color:var(--amber)">0</div><div class="stat-lbl">지각</div></div>
      <div class="stat-box"><div class="stat-num" id="s-rate" style="color:var(--accent)">-%</div><div class="stat-lbl">출석률</div></div>
    </div>
    <div id="att-times"></div>
  </div>

  <!-- 숙제 섹션 -->
  <div id="tab-hw" class="content" style="display:none">
    <div class="sec-header">
      <span class="sec-title">📚 숙제 안내</span>
      <span class="count-pill" id="hw-total">0개</span>
    </div>
    <div id="hw-list"></div>
  </div>

  <!-- 배지 섹션 -->
  <div id="tab-badges" class="content" style="padding-top:0;display:none">
    <div class="sec-header">
      <span class="sec-title">🏅 내가 받은 배지</span>
      <span class="count-pill" id="badge-total">0개</span>
    </div>
    <div class="badge-grid" id="badge-grid"></div>
  </div>

  <!-- 공지·메시지 탭 -->
  <div id="tab-ann" class="content" style="display:none">
    <div class="sec-header">
      <span class="sec-title">📢 공지사항</span>
      <span class="count-pill" id="ann-total">0건</span>
    </div>
    <div class="ann-list" id="ann-list"></div>
    <div class="sec-header" style="margin-top:28px">
      <span class="sec-title">💬 학원 메시지</span>
      <span class="count-pill" id="smsg-count">0건</span>
    </div>
    <div class="ann-list" id="student-msg-list"></div>
  </div>
</div>

<!-- ── 카메라 모달 ── -->
<div class="cam-modal-overlay" id="cam-modal">
  <div class="cam-wrap">
    <div class="cam-hdr">
      <span>📷 QR 출석 체크</span>
      <button onclick="closeCamera()">×</button>
    </div>
    <div class="cam-body">
      <video id="cam-video" autoplay playsinline muted></video>
      <canvas id="cam-canvas" style="display:none"></canvas>
      <div class="cam-guide-overlay">
        <div class="cam-frame"></div>
        <div class="cam-guide-txt">선생님이 보여주는 QR을 찍어주세요</div>
      </div>
    </div>
    <div class="cam-status" id="cam-status">카메라 시작 중...</div>
  </div>
</div>

<div class="toast" id="toast-ct"></div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
// ── 상수 & 데이터 ──
const BADGE_DEFS=[
  {id:'b1',name:'출석왕',icon:'👑',color:'#d97706',bg:'rgba(217,119,6,0.12)',desc:'이번 달 개근'},
  {id:'b2',name:'성적우수',icon:'🌟',color:'#3b82f6',bg:'rgba(59,130,246,0.12)',desc:'평가 90점 이상'},
  {id:'b3',name:'발전상',icon:'🚀',color:'#1a9e6a',bg:'rgba(26,158,106,0.12)',desc:'성적 꾸준한 향상'},
  {id:'b4',name:'열정상',icon:'💪',color:'#d63850',bg:'rgba(214,56,80,0.12)',desc:'수업 열정 최우수'},
  {id:'b5',name:'친절상',icon:'🌈',color:'#7c5cfc',bg:'rgba(124,92,252,0.12)',desc:'친구 배려 칭찬'},
  {id:'b6',name:'집중상',icon:'🎯',color:'#0891b2',bg:'rgba(8,145,178,0.12)',desc:'수업 집중력 우수'},
];
function _l(k){try{return JSON.parse(localStorage.getItem('ds_'+k)||'[]')}catch{return[]}}
function _lo(k){try{return JSON.parse(localStorage.getItem('ds_'+k)||'{}')}catch{return{}}}
function _s(k,v){localStorage.setItem('ds_'+k,JSON.stringify(v))}

let me=null;
let calY=new Date().getFullYear(), calM=new Date().getMonth();

// ── 토스트 ──
function toast(msg,type='success'){
  const c=document.getElementById('toast-ct');
  const el=document.createElement('div');el.className='toast-item '+type;
  el.textContent=(type==='success'?'✅ ':'❌ ')+msg;c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},2400);
}

// ── 로그인 ──
function initLogin(){
  const classes=_l('classes');
  const sel=document.getElementById('l-class');
  sel.innerHTML='<option value="">-- 반을 선택하세요 --</option>';
  classes.forEach(c=>sel.innerHTML+=`<option value="${c.id}">${c.name}</option>`);
}

function filterStudents(){
  const cf=document.getElementById('l-class').value;
  const students=_l('students').filter(s=>s.status==='재원'&&(!cf||s.classId===cf));
  const sel=document.getElementById('l-student');
  sel.innerHTML='<option value="">-- 이름을 선택하세요 --</option>';
  students.forEach(s=>sel.innerHTML+=`<option value="${s.id}">${s.name}</option>`);
}

function doLogin(){
  const sId=document.getElementById('l-student').value;
  const pw=document.getElementById('l-phone').value.trim();
  if(!sId){toast('이름을 선택하세요','error');return;}
  if(pw.length<4){toast('비밀번호 4자리를 입력하세요','error');return;}
  const student=_l('students').find(s=>s.id===sId);
  if(!student){toast('학생 정보를 찾을 수 없습니다','error');return;}
  const sp=(student.phone||'').replace(/\D/g,'');
  const ok=pw==='8285'||sp.endsWith(pw);
  if(!ok){toast('비밀번호가 일치하지 않습니다','error');return;}
  me=student;
  sessionStorage.setItem('ds_student_id',me.id);
  enterApp();
}

function logout(){
  sessionStorage.removeItem('ds_student_id');
  me=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='';
  initLogin();
}

function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='';
  const cls=(_l('classes')).find(c=>c.id===me.classId);
  document.getElementById('h-name').textContent=me.name;
  document.getElementById('h-class').textContent=cls?cls.name:'미배정';
  calY=new Date().getFullYear();calM=new Date().getMonth();
  showTab('att');
  renderBadges();
}

// ── 탭 전환 ──
function showTab(name){
  ['att','hw','badges','ann'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
    document.getElementById('tab-'+t+'-btn').classList.toggle('active',t===name);
  });
  if(name==='hw')renderHomework();
  if(name==='ann')renderAnn();
}

// ── 숙제 ──
function renderHomework(){
  if(!me)return;
  const hw=_l('homework').filter(h=>h.classId==='all'||h.classId===me.classId);
  const classes=_l('classes');
  document.getElementById('hw-total').textContent=hw.length+'개';
  const list=document.getElementById('hw-list');
  if(!hw.length){
    list.innerHTML=`<div class="empty-state"><span class="empty-icon">📚</span><div class="empty-text">등록된 숙제가 없습니다<br>선생님이 숙제를 등록하면 여기에 표시됩니다</div></div>`;
    return;
  }
  list.innerHTML=[...hw].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(h=>{
    const isOverdue=h.dueDate&&h.dueDate<new Date().toISOString().split('T')[0];
    return `<div class="hw-card">
      <div class="hw-card-title">${h.title}</div>
      <div class="hw-card-meta">
        <span>📅 등록: ${h.date||''}</span>
        ${h.dueDate?`<span style="color:${isOverdue?'var(--red)':'var(--text3)'}">⏰ 마감: ${h.dueDate}${isOverdue?' (기한 지남)':''}</span>`:''}
      </div>
      ${h.desc?`<div class="hw-desc">${h.desc}</div>`:''}
      ${h.url?`<a class="hw-link-btn" href="${h.url}" target="_blank">📖 숙제 바로 하기</a>`:'<div style="font-size:13px;color:var(--text3)">링크 없음 (선생님께 문의하세요)</div>'}
    </div>`;
  }).join('');
}

// ── 공지사항 ──
function renderAnn(){
  if(!me)return;
  const anns=_l('announcements').filter(a=>a.targetClass==='all'||a.targetClass===me.classId);
  const classes=_l('classes');
  const teachers=_l('teachers');
  document.getElementById('ann-total').textContent=anns.length+'건';
  const list=document.getElementById('ann-list');
  if(!anns.length){
    list.innerHTML=`<div class="empty-state"><span class="empty-icon">📢</span><div class="empty-text">공지사항이 없습니다</div></div>`;
  } else {
    list.innerHTML=[...anns].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(a=>{
      const cls=a.targetClass==='all'?null:(classes.find(c=>c.id===a.targetClass));
      const t=teachers.find(x=>x.id===a.teacherId);
      return `<div class="ann-card${a.important?' important':''}">
        <div class="ann-head">
          ${a.important?'<span class="ann-tag tag-important">🔴 중요</span>':'<span class="ann-tag tag-normal">일반</span>'}
          ${cls?`<span class="ann-tag tag-class">${cls.name}</span>`:'<span class="ann-tag tag-class">전체</span>'}
        </div>
        <div class="ann-title">${a.title}</div>
        <div class="ann-meta">${a.date||''} · ${t?t.name+' 선생님':'관리자'}</div>
        <div class="ann-body">${a.content||''}</div>
      </div>`;
    }).join('');
  }
  renderStudentMsgs();
}

// ── 학원 메시지 (학생 소통) ──
const SMSG_TYPE_CLS={'학습 안내':'mtype-study','출결 알림':'mtype-att','성적 통보':'mtype-score','수업 공지':'mtype-class','기타':'mtype-etc'};
function renderStudentMsgs(){
  if(!me)return;
  const msgs=_l('studentMessages').filter(m=>m.studentId===me.id);
  document.getElementById('smsg-count').textContent=msgs.length+'건';
  const list=document.getElementById('student-msg-list');
  if(!msgs.length){
    list.innerHTML=`<div class="empty-state"><span class="empty-icon">💬</span><div class="empty-text">학원에서 보낸 메시지가 없습니다</div></div>`;
    return;
  }
  list.innerHTML=[...msgs].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(m=>{
    const tc=SMSG_TYPE_CLS[m.type]||'mtype-etc';
    return `<div class="msg-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="msg-type-tag ${tc}">${m.type||'기타'}</span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">${m.date||''}</span>
      </div>
      <div class="ann-body">${m.content||''}</div>
    </div>`;
  }).join('');
}

// ── 출결 캘린더 ──
function changeMonth(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCalendar();}

function renderCalendar(){
  if(!me)return;
  const att=_lo('att');
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('cal-title').textContent=`${calY}년 ${calM+1}월`;
  const firstDow=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const prevDim=new Date(calY,calM,0).getDate();
  let html='',attC=0,absC=0,lateC=0,total=0;

  for(let i=0;i<firstDow;i++)
    html+=`<div class="cal-cell empty"><div class="cal-day-num">${prevDim-firstDow+1+i}</div></div>`;

  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const key=ds.replace(/-/g,'');
    const st=(att[key]||{})[me.id];
    const dow=new Date(calY,calM,d).getDay();
    let cls='cal-cell';
    if(ds===today)cls+=' today';
    if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';
    let chip='';
    if(st==='att'){chip='<span class="status-chip chip-att">출석</span>';attC++;total++;}
    else if(st==='abs'){chip='<span class="status-chip chip-abs">결석</span>';absC++;total++;}
    else if(st==='late'){chip='<span class="status-chip chip-late">지각</span>';lateC++;total++;}
    else if(st==='makeup'){chip='<span class="status-chip chip-makeup">보강</span>';attC++;total++;}
    else if(st==='noclass'){chip='<span class="status-chip chip-noclass">수업없음</span>';}
    html+=`<div class="${cls}"><div class="cal-day-num">${d}</div>${chip}</div>`;
  }
  const rem=(firstDow+dim)%7===0?0:7-(firstDow+dim)%7;
  for(let i=1;i<=rem;i++)html+=`<div class="cal-cell empty"><div class="cal-day-num">${i}</div></div>`;

  document.getElementById('cal-grid').innerHTML=html;
  document.getElementById('s-att').textContent=attC;
  document.getElementById('s-abs').textContent=absC;
  document.getElementById('s-late').textContent=lateC;
  const rate=total>0?Math.round(attC/total*100):'-';
  document.getElementById('s-rate').textContent=rate==='-'?'-':rate+'%';
  renderAttTimes();
}

// ── 배지 ──
function renderBadges(){
  if(!me)return;
  const myBadges=_l('studentBadges').filter(b=>b.studentId===me.id);
  const teachers=_l('teachers');
  document.getElementById('badge-total').textContent=myBadges.length+'개';
  const grid=document.getElementById('badge-grid');
  if(!myBadges.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <span class="empty-icon">🏅</span>
      <div class="empty-text">아직 받은 배지가 없어요<br>열심히 공부하면 선생님이 배지를 수여해 드려요!</div>
    </div>`;
    return;
  }
  grid.innerHTML=[...myBadges].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(b=>{
    const def=BADGE_DEFS.find(d=>d.id===b.badgeId)||{icon:'🏅',name:'배지',color:'#8896b8',bg:'var(--bg3)',desc:''};
    const teacher=teachers.find(t=>t.id===b.teacherId);
    return `<div class="badge-card" style="border-color:${def.color}50">
      <div class="badge-icon-wrap" style="background:${def.bg}">${def.icon}</div>
      <div class="badge-name" style="color:${def.color}">${def.name}</div>
      <div class="badge-desc">${def.desc}</div>
      ${b.note?`<div class="badge-note">"${b.note}"</div>`:''}
      <div class="badge-date">${b.date||''}</div>
      <div class="badge-from">${teacher?teacher.name+'선생님':'선생님'} 수여</div>
    </div>`;
  }).join('');
}

// ── QR 카메라 ──
let camStream=null, scanRaf=null;

function openCamera(){
  if(!me){toast('로그인 후 사용하세요','error');return;}
  // HTTPS / localhost 환경 체크
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    const modal=document.getElementById('cam-modal');
    modal.classList.add('open');
    document.getElementById('cam-status').textContent='⚠️ 카메라 사용 불가 — HTTPS 환경에서만 지원됩니다.\n(파일을 직접 열면 카메라를 사용할 수 없습니다)';
    return;
  }
  const modal=document.getElementById('cam-modal');
  modal.classList.add('open');
  document.getElementById('cam-status').textContent='카메라 시작 중...';
  const video=document.getElementById('cam-video');
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
    .then(stream=>{
      camStream=stream;
      video.srcObject=stream;
      const startScan=()=>{video.play().catch(()=>{});scanRaf=requestAnimationFrame(scanFrame);document.getElementById('cam-status').textContent='QR 코드를 화면에 비춰주세요';};
      video.onloadedmetadata=startScan;
      // 일부 브라우저에서 onloadedmetadata 미발생 대비
      setTimeout(()=>{if(!scanRaf&&camStream)startScan();},1500);
    })
    .catch(err=>{
      let msg='카메라를 사용할 수 없습니다';
      if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError')
        msg='카메라 권한이 거부되었습니다.\n브라우저 주소창 옆 🔒 아이콘 → 카메라 권한 허용 후 다시 시도하세요.';
      else if(err.name==='NotFoundError')
        msg='카메라를 찾을 수 없습니다.\n카메라가 연결되어 있는지 확인해주세요.';
      else if(err.name==='NotReadableError')
        msg='카메라가 다른 앱에서 사용 중입니다.\n다른 앱을 닫고 다시 시도해주세요.';
      else if(err.name==='OverconstrainedError')
        msg='카메라 설정 오류입니다. 다시 시도해주세요.';
      document.getElementById('cam-status').textContent='❌ '+msg;
      toast('카메라 오류: '+err.name,'error');
    });
}

function closeCamera(){
  document.getElementById('cam-modal').classList.remove('open');
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  if(scanRaf){cancelAnimationFrame(scanRaf);scanRaf=null;}
}

function scanFrame(){
  const video=document.getElementById('cam-video');
  const canvas=document.getElementById('cam-canvas');
  if(!camStream){return;}
  if(video.readyState===video.HAVE_ENOUGH_DATA&&video.videoWidth>0){
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
    if(code){processQR(code.data);return;}
  }
  scanRaf=requestAnimationFrame(scanFrame);
}

function processQR(data){
  closeCamera();
  if(!data.startsWith('DSATT:')){
    toast('DS English 출석 QR이 아닙니다','error');return;
  }
  const parts=data.split(':');
  const dateKey=parts[1]; // YYYYMMDD
  if(!dateKey||dateKey.length!==8){toast('QR 코드 형식 오류','error');return;}
  const dateStr=`${dateKey.slice(0,4)}-${dateKey.slice(4,6)}-${dateKey.slice(6,8)}`;
  const now=new Date();
  const timeStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // 출결 저장
  const att=_lo('att');
  if(!att[dateKey])att[dateKey]={};
  att[dateKey][me.id]='att';
  _s('att',att);

  // 출석 시간 저장
  const times=_lo('attTime');
  if(!times[dateKey])times[dateKey]={};
  times[dateKey][me.id]=timeStr;
  _s('attTime',times);

  renderCalendar();
  toast(`✅ 출석 완료  ${dateStr}  ${timeStr}`,'success');
}

// ── 출석 시간 목록 ──
function renderAttTimes(){
  if(!me)return;
  const times=_lo('attTime');
  const monthStr=`${calY}-${String(calM+1).padStart(2,'0')}`;
  const entries=[];
  Object.keys(times).forEach(key=>{
    const ds=`${key.slice(0,4)}-${key.slice(4,6)}-${key.slice(6,8)}`;
    if(ds.startsWith(monthStr)&&times[key][me.id]){
      entries.push({date:ds,time:times[key][me.id]});
    }
  });
  const el=document.getElementById('att-times');
  if(!entries.length){el.innerHTML='';return;}
  entries.sort((a,b)=>b.date.localeCompare(a.date));
  el.innerHTML=`<div class="att-times-card">
    <div class="att-times-title">🕐 QR 출석 시간 기록</div>
    ${entries.map(e=>`<div class="att-time-row">
      <span style="color:var(--text2)">${e.date}</span>
      <span style="color:var(--green);font-weight:700;font-family:var(--mono)">${e.time}</span>
    </div>`).join('')}
  </div>`;
}

// ── 초기화 ──
(function(){
  const savedId=sessionStorage.getItem('ds_student_id');
  if(savedId){
    const s=_l('students').find(x=>x.id===savedId);
    if(s){me=s;enterApp();return;}
  }
  initLogin();
})();
</script>
